services:
  db:
    build:
      context: ./db
    container_name: managant-backend-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-managant}
      MYSQL_USER: ${DB_USER:-managant}
      MYSQL_PASSWORD: ${DB_PASSWORD:-managant}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT_HOST:-3311}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
    container_name: managant-backend-api
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-managant}
      DB_USER: ${DB_USER:-managant}
      DB_PASSWORD: ${DB_PASSWORD:-managant}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PHONE_ENCRYPTION_KEY: ${PHONE_ENCRYPTION_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
